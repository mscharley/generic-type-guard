name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    uses: mscharley/.github/.github/workflows/changesets.yml@6ed05c913b7ae5ceb40b59bf597f0e4fc76f9b56 # main
    with:
      node-version-file: .tool-versions
    permissions:
      contents: write
      id-token: write
    secrets:
      token: ${{ secrets.DEPENDENCY_UPDATE_GITHUB_TOKEN }}
      npm-token: ${{ secrets.NPM_TOKEN }}
