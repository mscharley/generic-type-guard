name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    uses: mscharley/.github/.github/workflows/changesets.yml@de06745e8298d9a77c20fd040c8fde630d31eb5e # main
    with:
      node-version-file: .tool-versions
    permissions:
      contents: write
      id-token: write
    secrets:
      token: ${{ secrets.DEPENDENCY_UPDATE_GITHUB_TOKEN }}
      npm-token: ${{ secrets.NPM_TOKEN }}
